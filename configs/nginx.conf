worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/x-mpegURL;

    # ── HLS Origin Server ──────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # CORS headers for HLS/DASH delivery
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Range,DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type' always;

        # HLS segments — short cache, serve from streams dir
        location /hls/ {
            alias /var/www/streams/;

            # M3U8 playlists — very short cache for live streams
            location ~* \.m3u8$ {
                add_header Cache-Control "max-age=2, public";
                add_header Content-Type "application/vnd.apple.mpegurl";
                add_header 'Access-Control-Allow-Origin' '*' always;
            }

            # TS segments — longer cache
            location ~* \.ts$ {
                add_header Cache-Control "max-age=60, public";
                add_header Content-Type "video/mp2t";
                add_header 'Access-Control-Allow-Origin' '*' always;
            }

            # DASH segments
            location ~* \.m4s$ {
                add_header Cache-Control "max-age=60, public";
                add_header Content-Type "video/iso.segment";
                add_header 'Access-Control-Allow-Origin' '*' always;
            }

            # MPD manifests
            location ~* \.mpd$ {
                add_header Cache-Control "max-age=2, public";
                add_header Content-Type "application/dash+xml";
                add_header 'Access-Control-Allow-Origin' '*' always;
            }
        }

        # API proxy to SRS
        location /api/srs/ {
            proxy_pass http://srs:1985/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        # API proxy to ad server
        location /api/ads/ {
            proxy_pass http://ad-server:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        # Health check
        location /nginx-health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Preflight OPTIONS handling
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # ── SSL Termination (placeholder — configure with real certs) ─────────
    # server {
    #     listen 443 ssl http2;
    #     server_name video.example.com;
    #
    #     ssl_certificate     /etc/ssl/certs/video.example.com.crt;
    #     ssl_certificate_key /etc/ssl/private/video.example.com.key;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache   shared:SSL:10m;
    #
    #     location /hls/ {
    #         alias /var/www/streams/;
    #     }
    # }
}
