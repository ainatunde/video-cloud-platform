apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: TimescaleDB
    type: postgres
    access: proxy
    url: timescaledb:5432
    database: metrics
    user: tsdb
    secureJsonData:
      password: "${TIMESCALE_PASSWORD}"
    jsonData:
      sslmode: disable
      timescaledb: true
    editable: false
