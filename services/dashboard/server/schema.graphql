type Query {
  streams: [Stream!]!
  stream(id: ID!): Stream
  analytics(streamId: ID!, from: String!, to: String!): Analytics
  adServers: [AdServer!]!
}

type Mutation {
  startStream(input: StreamInput!): Stream!
  stopStream(id: ID!): Boolean!
  injectMarker(streamId: ID!, pts: Float!, duration: Float!): SCTE35Marker!
  updateAdServer(id: ID!, input: AdServerInput!): AdServer!
}

type Stream {
  id: ID!
  name: String!
  status: StreamStatus!
  ingestUrl: String!
  hlsUrl: String!
  viewers: Int!
  bitrate: Int!
  createdAt: String!
}

enum StreamStatus {
  ACTIVE
  IDLE
  ERROR
}

type Analytics {
  avgBitrate: Float!
  avgLatency: Float!
  bufferRatio: Float!
  impressions: Int!
  completionRate: Float!
}

type AdServer {
  id: ID!
  name: String!
  type: String!
  enabled: Boolean!
  url: String
}

type SCTE35Marker {
  eventId: ID!
  pts: Float!
  duration: Float!
  injectedAt: String!
}

input StreamInput {
  name: String!
  protocol: String!
}

input AdServerInput {
  enabled: Boolean
  url: String
}
