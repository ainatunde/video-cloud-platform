apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: video-platform
  labels:
    app: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: video-platform/dashboard:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: database-url
            - name: SRS_API_URL
              value: "http://srs:1985"
            - name: TRANSCODER_URL
              value: "http://ffmpeg-transcoder:8002"
            - name: AD_SERVER_URL
              value: "http://ad-server:3000"
            - name: SCTE35_URL
              value: "http://scte35-processor:8001"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
