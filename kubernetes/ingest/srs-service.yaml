apiVersion: v1
kind: Service
metadata:
  name: srs
  namespace: video-platform
  labels:
    app: srs
spec:
  selector:
    app: srs
  type: LoadBalancer
  ports:
    - name: rtmp
      port: 1935
      targetPort: 1935
      protocol: TCP
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: srt
      port: 8890
      targetPort: 8890
      protocol: UDP
    - name: api
      port: 1985
      targetPort: 1985
      protocol: TCP
