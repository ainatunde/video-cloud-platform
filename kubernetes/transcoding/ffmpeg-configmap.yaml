apiVersion: v1
kind: ConfigMap
metadata:
  name: ffmpeg-presets
  namespace: video-platform
data:
  360p.json: |
    {
      "name": "360p",
      "width": 640,
      "height": 360,
      "video_bitrate": "800k",
      "audio_bitrate": "64k",
      "codec": "libx264",
      "preset": "fast",
      "profile": "baseline",
      "level": "3.0",
      "fps": 30,
      "keyframe_interval": 60
    }
  480p.json: |
    {
      "name": "480p",
      "width": 854,
      "height": 480,
      "video_bitrate": "1400k",
      "audio_bitrate": "96k",
      "codec": "libx264",
      "preset": "fast",
      "profile": "main",
      "level": "3.1",
      "fps": 30,
      "keyframe_interval": 60
    }
  720p.json: |
    {
      "name": "720p",
      "width": 1280,
      "height": 720,
      "video_bitrate": "2800k",
      "audio_bitrate": "128k",
      "codec": "libx264",
      "preset": "fast",
      "profile": "high",
      "level": "4.0",
      "fps": 30,
      "keyframe_interval": 60
    }
  1080p.json: |
    {
      "name": "1080p",
      "width": 1920,
      "height": 1080,
      "video_bitrate": "5000k",
      "audio_bitrate": "192k",
      "codec": "libx264",
      "preset": "medium",
      "profile": "high",
      "level": "4.1",
      "fps": 30,
      "keyframe_interval": 60
    }
