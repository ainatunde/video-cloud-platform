version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# Development overlay — hot reload, debug ports, source mounts
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ───────────────────────────────────────────────────────────────────────────
  # SRS — reduced resource limits in dev
  # ───────────────────────────────────────────────────────────────────────────
  srs:
    environment:
      - SRS_LOG_LEVEL=verbose
    deploy:
      resources:
        limits:
          memory: 512M

  # ───────────────────────────────────────────────────────────────────────────
  # YOLO Analyzer — source mount + debug port
  # ───────────────────────────────────────────────────────────────────────────
  yolo-analyzer:
    build:
      context: ./services/ai-analysis
      target: development
    volumes:
      - ./services/ai-analysis:/app
      - /app/__pycache__
    environment:
      - RELOAD=true
      - LOG_LEVEL=debug
    ports:
      - "8000:8000"   # expose directly for dev inspection
      - "5678:5678"   # debugpy remote debug
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    deploy:
      resources:
        limits:
          memory: 2G

  # ───────────────────────────────────────────────────────────────────────────
  # SCTE-35 Processor — source mount + reload
  # ───────────────────────────────────────────────────────────────────────────
  scte35-processor:
    volumes:
      - ./services/scte35-processor:/app
      - /app/__pycache__
    environment:
      - LOG_LEVEL=debug
    ports:
      - "8001:8001"
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]

  # ───────────────────────────────────────────────────────────────────────────
  # FFmpeg Transcoder — debug port + verbose logging
  # ───────────────────────────────────────────────────────────────────────────
  ffmpeg-transcoder:
    volumes:
      - ./services/transcoding:/app
      - /app/__pycache__
    environment:
      - LOG_LEVEL=debug
      - FFMPEG_LOG_LEVEL=verbose
    ports:
      - "8002:8002"
    command: ["uvicorn", "transcoding_manager:app", "--host", "0.0.0.0", "--port", "8002", "--reload"]
    deploy:
      resources:
        limits:
          memory: 4G

  # ───────────────────────────────────────────────────────────────────────────
  # Shaka Packager — debug port + reload
  # ───────────────────────────────────────────────────────────────────────────
  shaka-packager:
    volumes:
      - ./services/packaging:/app
      - /app/__pycache__
    ports:
      - "8003:8003"
    command: ["uvicorn", "shaka_packager:app", "--host", "0.0.0.0", "--port", "8003", "--reload"]

  # ───────────────────────────────────────────────────────────────────────────
  # Ad Server — nodemon hot reload + Node inspect
  # ───────────────────────────────────────────────────────────────────────────
  ad-server:
    build:
      context: ./services/ad-insertion
      target: development
    volumes:
      - ./services/ad-insertion:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
    ports:
      - "${AD_SERVER_PORT:-3000}:3000"
      - "9229:9229"   # Node.js inspector
    command: ["node", "--inspect=0.0.0.0:9229", "src/index.js"]
    deploy:
      resources:
        limits:
          memory: 512M

  # ───────────────────────────────────────────────────────────────────────────
  # Dashboard — hot reload
  # ───────────────────────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./services/dashboard
      target: development
    volumes:
      - ./services/dashboard:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
    ports:
      - "${DASHBOARD_PORT:-3002}:3002"
      - "9230:9230"   # Node.js inspector
    command: ["npm", "run", "dev"]
    deploy:
      resources:
        limits:
          memory: 1G

  # ───────────────────────────────────────────────────────────────────────────
  # PostgreSQL — expose port for local DB tools
  # ───────────────────────────────────────────────────────────────────────────
  postgres:
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}

  # ───────────────────────────────────────────────────────────────────────────
  # TimescaleDB — expose for local DB tools
  # ───────────────────────────────────────────────────────────────────────────
  timescaledb:
    ports:
      - "5433:5432"

  # ───────────────────────────────────────────────────────────────────────────
  # Redis — expose for local inspection
  # ───────────────────────────────────────────────────────────────────────────
  redis:
    ports:
      - "6379:6379"

  # ───────────────────────────────────────────────────────────────────────────
  # Grafana — expose directly
  # ───────────────────────────────────────────────────────────────────────────
  grafana:
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer

  # ───────────────────────────────────────────────────────────────────────────
  # Prometheus — expose for direct queries
  # ───────────────────────────────────────────────────────────────────────────
  prometheus:
    ports:
      - "9090:9090"
